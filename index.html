<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>A Story I'd Like to Write With You ❤️</title>

    <link rel="stylesheet" href="style.css">

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Caveat:wght@500;700&display=swap"
          rel="stylesheet">

</head>

<body>

    <!-- Stars -->
    <canvas id="sky"></canvas>

    <!-- Moon -->
    <div id="moon"></div>

    <!-- Background Music -->
    <audio id="music" loop>
        <source src="assets/piano.mp3" type="audio/mpeg">
    </audio>

    <!-- Story -->
    <main id="story">

        <div class="paper" id="paper">

            <h2 id="chapter"></h2>

            <h1 id="title"></h1>

            <div id="photoContainer" class="hidden">

                <img id="photo"
                     src=""
                     alt="Memory">

                <p id="caption"></p>

            </div>

            <div id="text"></div>

            <button id="nextBtn">

                Start ❤️

            </button>

        </div>

    </main>

    <!-- Floating Hearts -->
    <div id="heartContainer"></div>

    <!-- Sparkles -->
    <div id="sparkleContainer"></div>

    <script src="script.js"></script>

    <div id="moon"></div>
    
</body>

</html>
